<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>出货单</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --ink:#1f1b16; --sub:#6f675d; --line:#ddd5c8; --line-strong:#cbbda7; --bg:#f3eee5; --paper:#fffdf8;
  --surface:#f8f4ec; --accent:#b8892d; --accent-deep:#8c6218; --accent-soft:#efe1be; --shadow:0 18px 36px rgba(49,37,15,.08); --shadow-soft:0 10px 22px rgba(49,37,15,.05); --focus:0 0 0 4px rgba(184,137,45,.14);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{
  background:
    radial-gradient(circle at top left, rgba(255,255,255,.9) 0%, transparent 28%),
    radial-gradient(circle at top right, rgba(233,222,203,.9) 0%, transparent 24%),
    linear-gradient(180deg,#f7f2e9 0%, var(--bg) 18%, #f1ece2 100%);
  color:var(--ink);font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;font-size:14px;line-height:1.5
}
.app{max-width:820px;margin:0 auto;padding:20px 16px 128px}
.page-hero{position:relative;margin:2px 0 16px;padding:18px 20px 16px;border:1px solid rgba(203,189,167,.9);border-radius:22px;background:linear-gradient(135deg,rgba(255,253,248,.98),rgba(247,239,225,.96));box-shadow:0 18px 40px rgba(48,36,16,.1);overflow:hidden}
.page-hero::before{content:"";position:absolute;top:-24px;right:-20px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(184,137,45,.18) 0%,rgba(184,137,45,0) 68%)}
.page-hero::after{content:"";position:absolute;left:20px;right:20px;bottom:0;height:1px;background:linear-gradient(90deg,rgba(184,137,45,.34),rgba(184,137,45,0))}
.page-eyebrow{position:relative;z-index:1;font-size:11px;font-weight:800;letter-spacing:2.4px;text-transform:uppercase;color:var(--accent-deep);margin-bottom:8px}
.page-title-row{position:relative;z-index:1;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.page-title{font-size:34px;font-weight:900;letter-spacing:1px;line-height:1.05;color:#2b241a}
.page-chip{display:inline-flex;align-items:center;padding:6px 11px;border-radius:999px;border:1px solid rgba(184,137,45,.28);background:rgba(239,225,190,.72);font-size:12px;font-weight:700;letter-spacing:.6px;color:var(--accent-deep)}
.page-desc{position:relative;z-index:1;margin-top:8px;max-width:520px;font-size:13px;line-height:1.55;color:#756b5d}
.section-title{margin:8px 2px 14px;display:flex;align-items:center;gap:14px}
.section-title::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,rgba(84,75,63,.24),rgba(84,75,63,0))}
.section-title-label{display:inline-flex;align-items:center;padding:8px 14px;border-radius:16px;border:1px solid rgba(184,137,45,.24);background:linear-gradient(135deg,rgba(255,253,248,.98),rgba(243,231,204,.94));box-shadow:var(--shadow-soft);font-size:24px;font-weight:900;letter-spacing:1px;line-height:1;color:#2b241a}
.card{background:linear-gradient(180deg,rgba(255,255,255,.92),rgba(255,252,246,.96));border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:var(--shadow-soft);backdrop-filter:blur(6px)}
.preview-card{padding:0;overflow:hidden;border-color:#d6c8b0}
.preview-stage{position:relative;padding:18px;background:linear-gradient(180deg,#f6efe2,#efe4d2)}
.preview-stage::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at top left,rgba(255,255,255,.85),transparent 30%),linear-gradient(135deg,rgba(201,169,97,.08),transparent 42%);pointer-events:none}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px}
.card-kicker{font-size:14px;font-weight:800;letter-spacing:.4px;color:#2f281e;line-height:1.2}
.card-note{font-size:11.5px;color:var(--sub);margin-top:4px;line-height:1.45}
label{display:block;font-size:12px;color:var(--sub);margin-bottom:6px;font-weight:600;letter-spacing:.2px}
input,textarea,select{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:15px;font-family:inherit;line-height:1.35;background:rgba(255,255,255,.92);color:var(--ink);transition:border-color .18s ease,box-shadow .18s ease,background .18s ease}
input::placeholder,textarea::placeholder{color:#9f9382}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:var(--focus);background:#fff}
input:hover,textarea:hover,select:hover{border-color:var(--line-strong);background:#fffefb}
input:disabled{background:#f2ede4;color:#9a907f;cursor:not-allowed}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.row.full{grid-template-columns:1fr}
.row > div,.field{position:relative}
.row > div > label:first-child,.field > label{transition:color .18s ease,letter-spacing .18s ease}
.row > div:focus-within > label:first-child,.field:focus-within > label{color:var(--accent-deep);letter-spacing:.2px}
.items .item{display:grid;grid-template-columns:1fr 60px 58px 68px 28px;gap:6px;margin-bottom:9px;align-items:center;padding:8px 10px;border:1px solid transparent;border-radius:12px;background:var(--surface);transition:border-color .18s ease,box-shadow .18s ease,background .18s ease}
.items .item:focus-within{border-color:rgba(184,137,45,.34);box-shadow:var(--shadow-soft);background:#fff}
.items .item input,.items .item select{padding:8px 6px;font-size:14px;background:transparent;border-color:transparent;box-shadow:none}
.items .hdr{display:grid;grid-template-columns:1fr 60px 58px 68px 28px;gap:6px;font-size:10.5px;color:#807668;margin-bottom:6px;padding:0 10px;letter-spacing:.9px;text-transform:uppercase}
.del{background:#fff7f3;border:1px solid #e5d7c8;border-radius:10px;height:36px;font-size:18px;color:#a36d59;cursor:pointer}
.btn{background:linear-gradient(180deg,#24211c,#12100d);color:#fff;border:1px solid #161310;border-radius:12px;padding:12px 16px;font-size:14.5px;font-weight:600;cursor:pointer;width:100%;margin-top:6px;box-shadow:0 12px 26px rgba(18,16,13,.18);transition:transform .18s ease,box-shadow .18s ease,background .18s ease}
.btn:hover{transform:translateY(-1px);box-shadow:0 16px 30px rgba(18,16,13,.2)}
.btn.sec{background:linear-gradient(180deg,#fffdf8,#f4ecdf);color:#2b251b;border:1px solid var(--line-strong);box-shadow:var(--shadow-soft)}
.btn.ghost{background:rgba(255,253,248,.72);color:#5f574b;border:1px dashed #d7cbb8;box-shadow:none}
.btn.ghost:hover{box-shadow:var(--shadow-soft);background:rgba(255,253,248,.95)}
.btn.sm{padding:7px 10px;font-size:12px;width:auto;margin-top:0}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-row .btn{margin-top:0}
.action-dock{margin-top:6px}
.action-dock .btn-row + .btn-row{margin-top:10px}
.lib-btn{background:linear-gradient(180deg,#fff,#f4ecdf);border:1px solid var(--line-strong);color:#322b21;border-radius:10px;padding:8px 12px;font-size:12.5px;font-weight:600;cursor:pointer;box-shadow:var(--shadow-soft)}
.mask{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:flex-end;justify-content:center}
.mask.show{display:flex}
.sheet{background:#fff;width:100%;max-width:780px;max-height:85vh;border-radius:12px 12px 0 0;display:flex;flex-direction:column;overflow:hidden}
.sheet-head{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--line)}
.x{background:none;border:none;font-size:24px;color:#999;cursor:pointer;line-height:1;padding:0 4px}
.sheet-tools{display:flex;gap:6px;padding:10px 14px;border-bottom:1px solid #eee;flex-wrap:wrap}
.lib-list{overflow-y:auto;padding:8px 12px 16px;flex:1}
.lib-row{display:grid;grid-template-columns:1fr 60px 70px 28px;gap:6px;align-items:center;padding:6px 0;border-bottom:1px dashed #eee}
.lib-row input{padding:7px 8px;font-size:13px}
.suggest{display:none;position:absolute;background:rgba(255,253,248,.98);border:1px solid var(--line-strong);border-radius:12px;box-shadow:0 16px 36px rgba(28,22,13,.16);max-height:240px;overflow-y:auto;z-index:200;min-width:200px;backdrop-filter:blur(10px)}
.suggest.show{display:block}
.suggest .s-item{padding:9px 12px;font-size:13px;cursor:pointer;display:flex;justify-content:space-between;gap:10px;border-bottom:1px solid #f3f3f3}
.suggest .s-item:last-child{border-bottom:none}
.suggest .s-item:hover,.suggest .s-item.active{background:#f7f0e2}
.suggest .s-name{flex:1;color:#222}
.suggest .s-meta{color:#888;font-size:11px;font-family:-apple-system,sans-serif;flex-shrink:0}
.suggest .s-empty{padding:12px;color:#999;font-size:12px;text-align:center}

/* 预览 ===== 简洁商务 · 精修版 ===== */
#preview{background:#fffefb;color:#111;padding:40px 34px 34px;font-family:"SimSun","Songti SC","Noto Serif CJK SC",serif;width:100%;max-width:760px;margin:0 auto;position:relative;border:1px solid #e5dccd;border-radius:8px;box-shadow:0 18px 38px rgba(33,24,12,.1)}
#preview::before{content:"";position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#111 0%,#111 35%,#c9a961 35%,#c9a961 42%,#111 42%,#111 100%)}
#preview .brand{display:flex;align-items:center;gap:12px;margin-bottom:18px}
#preview .brand-mark{width:38px;height:38px;background:#111;color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;font-family:serif;flex-shrink:0}
#preview .brand-name{font-size:16px;font-weight:600;letter-spacing:3px;line-height:1.2}
#preview .brand-phone{font-size:11px;color:#777;letter-spacing:1px;margin-top:2px;font-family:-apple-system,sans-serif}
#preview .title-wrap{text-align:center;margin:22px 0 18px;position:relative}
#preview .doc-title{display:inline-block;font-size:26px;font-weight:700;letter-spacing:12px;padding:0 20px;background:#fff;position:relative;z-index:1}
#preview .title-wrap::before{content:"";position:absolute;left:0;right:0;top:50%;height:1px;background:#111}
#preview .doc-sub{text-align:center;font-size:10px;color:#999;letter-spacing:4px;margin-top:-2px;font-family:-apple-system,sans-serif}
#preview .meta{display:flex;justify-content:space-between;margin:20px 0 14px;font-size:12.5px;gap:16px}
#preview .meta .m-l,#preview .meta .m-r{flex:1}
#preview .meta .m-r{text-align:right}
#preview .meta .k{color:#888;margin-right:4px;font-size:11px}
#preview .meta div{margin-bottom:5px}
#preview table{width:100%;border-collapse:collapse;font-size:12.5px}
#preview th,#preview td{border:1px solid #bbb;padding:9px 5px;text-align:center}
#preview thead th{background:#111;color:#fff;font-weight:500;letter-spacing:1px;border-color:#111;padding:10px 5px;font-size:12px}
#preview td.name{text-align:left;padding-left:12px}
#preview tbody tr:nth-child(even) td{background:#fafafa}
#preview tfoot td{font-weight:700;background:#f0f0f0;padding:11px 5px;border:1px solid #bbb;border-top:2px solid #111;font-size:13px}
#preview .total-cn{font-size:12.5px;padding:11px 12px;background:#fafafa;border:1px solid #bbb;border-top:none;display:flex;justify-content:space-between;align-items:center;gap:8px}
#preview .total-cn .k{color:#888;font-size:11px;letter-spacing:1px;flex-shrink:0}
#preview .total-cn .v{font-weight:600;letter-spacing:1px;text-align:right}
#preview .invoice-note{margin-top:10px;font-size:11.5px;color:#7a6330;padding:8px 10px;border:1px solid #ead8a0;background:#fcfbf7}
#preview .remark{margin-top:14px;font-size:11.5px;color:#555;min-height:30px;padding:8px 10px;border-left:2px solid #c9a961;background:#fcfbf7}
#preview .foot{display:flex;justify-content:flex-end;align-items:baseline;margin-top:26px}
#preview .foot .k{font-size:13px;color:#333;letter-spacing:1px}
#preview .foot .name{font-family:"Hanzipen SC","HanziPen SC","Hannotate SC","Caveat","STKaiti","Kaiti SC","楷体",cursive;font-size:22px;font-weight:500;color:#1a1a1a;letter-spacing:3px;margin-left:2px;min-width:60px;display:inline-block}

@media(max-width:420px){
  .page-hero{padding:16px 16px 14px}
  .page-title{font-size:28px}
  .page-desc{font-size:12.5px}
  .section-title-label{font-size:20px;padding:7px 12px}
  .btn-row{grid-template-columns:1fr}
  .items .item,.items .hdr{grid-template-columns:1fr 50px 48px 58px 26px}
  .preview-stage{padding:12px}
  #preview{padding:28px 18px 22px}
  #preview .doc-title{font-size:22px;letter-spacing:8px;padding:0 12px}
  #preview .brand-name{font-size:14px;letter-spacing:2px}
}
@media(max-width:720px){
  .action-dock{position:sticky;bottom:12px;z-index:40;padding:12px;border:1px solid rgba(203,189,167,.8);border-radius:18px;background:rgba(250,245,236,.84);backdrop-filter:blur(14px);box-shadow:0 22px 40px rgba(35,26,13,.16)}
}
</style>
</head>
<body>
<div class="app">
  <header class="page-hero">
    <div class="page-eyebrow">开单工具</div>
    <div class="page-title-row">
      <div class="page-title">出货单</div>
      <div class="page-chip">录入页</div>
    </div>
    <div class="page-desc">填写客户、商品明细与开票信息，导出图片或 PDF 后即可直接发给客户。</div>
  </header>

  <div class="card">
    <div class="card-head">
      <div>
        <div class="card-kicker">基础信息</div>
        <div class="card-note">店铺、客户与开票设置</div>
      </div>
    </div>
    <div class="row full"><div><label>店铺抬头</label><input id="shop" placeholder="例：小芳服饰辅料"></div></div>
    <div class="row">
      <div><label>本店电话</label><input id="phone" placeholder="联系电话"></div>
      <div><label>客户名称</label><input id="cust" placeholder="客户名"></div>
    </div>
    <div class="row">
      <div><label>单号</label><input id="no"></div>
      <div><label>日期</label><input id="date" type="date"></div>
    </div>
    <div class="row full" id="invoiceRow">
      <div>
        <label>是否开票</label>
        <label style="display:flex;align-items:center;gap:8px;padding:9px 10px;border:1px solid var(--line);border-radius:4px;background:#fff;cursor:pointer;height:38px">
          <input type="checkbox" id="invoice" style="width:auto;margin:0">
          <span id="invoiceLabel" style="flex:1;color:#666;font-size:13px">开发票</span>
        </label>
      </div>
      <div id="invoiceRateWrap" style="display:none">
        <label>发票系数</label>
        <input id="invoiceRate" type="number" inputmode="decimal" step="0.0001" value="1.01" disabled>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-head">
      <div>
        <div class="card-kicker">商品明细</div>
        <div class="card-note">点进品名即可展开辅料库，输入时会自动筛选</div>
      </div>
      <button class="lib-btn" onclick="openLib()">📋 辅料库</button>
    </div>
    <div class="items" id="items">
      <div class="hdr"><div>品名 / 规格</div><div>数量</div><div>单位</div><div>单价</div><div></div></div>
    </div>
    <button class="btn sec" onclick="addItem()">+ 添加一行</button>
  </div>

  <!-- 辅料库弹层 -->
  <div id="libMask" class="mask" onclick="if(event.target===this)closeLib()">
    <div class="sheet">
      <div class="sheet-head">
        <div style="font-weight:600;font-size:15px">辅料库</div>
        <button class="x" onclick="closeLib()">×</button>
      </div>
      <div class="sheet-tools">
        <button class="btn sec sm" onclick="libAdd()">+ 新增</button>
        <button class="btn sec sm" onclick="libPaste()">📋 批量粘贴</button>
        <button class="btn sec sm" onclick="libExportFile()">导出文件</button>
        <button class="btn sec sm" onclick="document.getElementById('libImport').click()">导入文件</button>
        <input id="libImport" type="file" accept=".json,.txt,.csv" style="display:none" onchange="libImportFile(event)">
      </div>
      <div id="libList" class="lib-list"></div>
      <div id="pasteBox" style="display:none;padding:14px;border-top:1px solid #eee;background:#fafafa">
        <div style="font-size:12px;color:#666;margin-bottom:6px">每行一条，格式：<code style="background:#fff;padding:1px 5px;border:1px solid #ddd;border-radius:3px">品名 | 单位 | 单价</code>。分隔符可用 <code style="background:#fff;padding:1px 5px;border:1px solid #ddd;border-radius:3px">|</code> 或 <code style="background:#fff;padding:1px 5px;border:1px solid #ddd;border-radius:3px">,</code> 或 制表符（从飞书/Excel 直接复制即可）。</div>
        <textarea id="pasteArea" rows="8" style="width:100%;border:1px solid var(--line);border-radius:4px;padding:10px;font-size:13px;font-family:monospace" placeholder="吊牌 | 张 | 0.42&#10;主唛 | 张 | 0.21&#10;..."></textarea>
        <div style="display:flex;gap:8px;margin-top:8px">
          <label style="display:flex;align-items:center;gap:4px;font-size:12px;color:#555;flex:1"><input type="checkbox" id="pasteReplace" style="width:auto">覆盖现有库（不勾则追加）</label>
          <button class="btn sec sm" onclick="closePaste()">取消</button>
          <button class="btn sm" style="background:#1a1a1a;color:#fff;width:auto" onclick="libPasteApply()">导入</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 品名搜索下拉 -->
  <div id="suggest" class="suggest"></div>

  <div class="card">
    <div class="card-head">
      <div>
        <div class="card-kicker">附加说明</div>
        <div class="card-note">快递单号、地址或其他想展示在单据上的说明</div>
      </div>
    </div>
    <div class="field">
      <label>备注</label>
      <textarea id="remark" rows="2" placeholder="如快递单号、收货地址等"></textarea>
    </div>
  </div>

  <div class="card">
    <div class="card-head">
      <div>
        <div class="card-kicker">经手信息</div>
        <div class="card-note">默认经办人为阿毅，可按实际情况修改</div>
      </div>
    </div>
    <div class="field">
      <label>经手人</label>
      <input id="signer" placeholder="经手人姓名">
    </div>
  </div>

  <div class="section-title"><span class="section-title-label">预览</span></div>
  <div class="card preview-card">
    <div class="preview-stage">
      <div id="preview"></div>
    </div>
  </div>

  <div class="action-dock">
    <div class="btn-row">
      <button class="btn ghost" onclick="newOrder()">新建下一单</button>
      <button class="btn ghost" onclick="clearCurrentOrder()">清空本单</button>
    </div>
    <div class="btn-row">
      <button class="btn" onclick="exportPNG()">导出图片</button>
      <button class="btn sec" onclick="exportPDF()">导出 PDF</button>
    </div>
  </div>
</div>

<script>
// ---------- 辅料库 ----------
const LIB_KEY='chuhuodan_lib_v3';
let LIB=[];
const DEFAULT_LIB=[
  {name:'吊牌（含绳已穿）',unit:'张',price:0.42},
  {name:'吊牌（配绳没穿）',unit:'张',price:0.42},
  {name:'Lana',unit:'张',price:0.15},
  {name:'Lana mohair',unit:'张',price:0.15},
  {name:'Lana seta',unit:'张',price:0.15},
  {name:'无蝴蝶结主唛',unit:'张',price:0.21},
  {name:'38码唛',unit:'张',price:0.09},
  {name:'40码唛',unit:'张',price:0.09},
  {name:'42码唛',unit:'张',price:0.09},
  {name:'44码唛',unit:'张',price:0.09},
  {name:'46码唛',unit:'张',price:0.09},
  {name:'48码唛',unit:'张',price:0.09},
  {name:'S码',unit:'张',price:0.09},
  {name:'M码',unit:'张',price:0.09},
  {name:'L码',unit:'张',price:0.09},
  {name:'TU唛',unit:'张',price:0.09},
  {name:'洗水唛',unit:'张',price:0.25},
  {name:'BR',unit:'张',price:0.12},
  {name:'CO',unit:'张',price:0.12},
  {name:'条形码贴纸',unit:'个',price:0.39},
];
function loadLib(){
  try{const d=JSON.parse(localStorage.getItem(LIB_KEY)||'null');LIB=Array.isArray(d)?d:DEFAULT_LIB.slice()}
  catch(e){LIB=DEFAULT_LIB.slice()}
}
function saveLib(){try{localStorage.setItem(LIB_KEY,JSON.stringify(LIB))}catch(e){}}
function openLib(){document.getElementById('libMask').classList.add('show');closePaste();renderLib()}
function closeLib(){document.getElementById('libMask').classList.remove('show')}
function libPaste(){document.getElementById('pasteBox').style.display='block';setTimeout(()=>document.getElementById('pasteArea').focus(),50)}
function closePaste(){document.getElementById('pasteBox').style.display='none';document.getElementById('pasteArea').value='';document.getElementById('pasteReplace').checked=false}
function parseLines(text){
  const out=[];
  text.split(/\r?\n/).forEach(line=>{
    const s=line.trim();if(!s)return;
    // 跳过表头行
    if(/^品名/.test(s))return;
    const parts=s.split(/[|,\t]/).map(x=>x.trim()).filter(Boolean);
    if(parts.length<2)return;
    const name=parts[0];
    let unit='张',price=0;
    if(parts.length===2){
      // 品名 + 单价(数字) 或 品名 + 单位
      if(!isNaN(Number(parts[1])))price=Number(parts[1]);else unit=parts[1];
    }else{
      unit=parts[1]||'张';
      price=Number(parts[2])||0;
    }
    out.push({name,unit,price});
  });
  return out;
}
function libPasteApply(){
  const txt=document.getElementById('pasteArea').value;
  const items=parseLines(txt);
  if(items.length===0){alert('没解析到有效条目');return}
  const replace=document.getElementById('pasteReplace').checked;
  const action=replace?'覆盖':'追加';
  if(!confirm('解析到 '+items.length+' 条，确认'+action+'？'))return;
  if(replace)LIB=items;else LIB=LIB.concat(items);
  saveLib();renderLib();closePaste();
}
function renderLib(){
  const box=document.getElementById('libList');
  box.innerHTML=LIB.map((it,i)=>`
    <div class="lib-row">
      <input value="${esc(it.name)}" placeholder="品名" oninput="libUpd(${i},'name',this.value)">
      <input value="${esc(it.unit)}" placeholder="单位" oninput="libUpd(${i},'unit',this.value)">
      <input type="number" inputmode="decimal" step="0.00001" value="${it.price}" placeholder="单价" oninput="libUpd(${i},'price',this.value)">
      <button class="del" onclick="libDel(${i})">×</button>
    </div>`).join('')||'<div style="padding:30px;text-align:center;color:#999;font-size:13px">还没有辅料，点上方"+ 新增"</div>';
}
function libUpd(i,k,v){LIB[i][k]=k==='price'?(Number(v)||0):v;saveLib()}
function libDel(i){if(confirm('删除「'+LIB[i].name+'」？'))LIB.splice(i,1),saveLib(),renderLib()}
function libAdd(){LIB.push({name:'',unit:'张',price:0});saveLib();renderLib();
  setTimeout(()=>{const inputs=document.querySelectorAll('#libList .lib-row input');if(inputs.length)inputs[inputs.length-4].focus()},50)}
function libExportFile(){
  const blob=new Blob([JSON.stringify(LIB,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='辅料库_'+todayStr()+'.json';a.click();
}
function libImportFile(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      let d;
      const txt=r.result;
      if(f.name.endsWith('.json')){
        d=JSON.parse(txt);
        if(!Array.isArray(d))throw 0;
      }else{
        // 当作文本格式解析（txt/csv）
        d=parseLines(txt);
        if(d.length===0)throw 0;
      }
      if(confirm('导入 '+d.length+' 条辅料，覆盖现有辅料库？'))LIB=d,saveLib(),renderLib();
    }catch(err){alert('文件格式不对')}
  };r.readAsText(f);e.target.value='';
}

// ---------- 品名搜索下拉 ----------
let suggestIdx=-1, suggestFor=null, suggestAnchor=null;
function positionSuggest(input=suggestAnchor){
  const sg=document.getElementById('suggest');
  if(!input||!sg.classList.contains('show'))return;
  if(!document.body.contains(input)){hideSuggest();return}
  const r=input.getBoundingClientRect();
  const width=Math.max(220,r.width+120);
  let left=r.left+window.scrollX;
  const maxLeft=window.scrollX+document.documentElement.clientWidth-width-12;
  left=Math.max(window.scrollX+12,Math.min(left,maxLeft));
  let top=r.bottom+window.scrollY+2;
  const menuHeight=Math.min(sg.scrollHeight||240,240);
  const viewportBottom=window.scrollY+window.innerHeight;
  if(top+menuHeight>viewportBottom-12&&r.top>menuHeight+12){
    top=r.top+window.scrollY-menuHeight-6;
  }
  sg.style.left=left+'px';
  sg.style.top=top+'px';
  sg.style.minWidth=width+'px';
}
function showSuggest(input,itemIdx,forceAll=false){
  const sg=document.getElementById('suggest');
  const q=forceAll?'':(input.value||'').trim().toLowerCase();
  const matches=forceAll?LIB.slice():LIB.filter(l=>l.name&&l.name.toLowerCase().includes(q));
  suggestFor=itemIdx;suggestIdx=-1;suggestAnchor=input;
  if(matches.length===0&&q===''){hideSuggest();return}
  if(matches.length===0){
    sg.innerHTML='<div class="s-empty">无匹配，按当前输入即可</div>';
  }else{
    sg.innerHTML=matches.map((m,i)=>`<div class="s-item" data-i="${i}" onmousedown="pickSuggest(${itemIdx},${LIB.indexOf(m)})"><span class="s-name">${esc(m.name)}</span><span class="s-meta">${esc(m.unit)} · ¥${m.price}</span></div>`).join('');
  }
  sg.classList.add('show');
  positionSuggest(input);
}
function hideSuggest(){document.getElementById('suggest').classList.remove('show');suggestFor=null;suggestAnchor=null}
function pickSuggest(itemIdx,libIdx){
  const it=LIB[libIdx];
  S.items[itemIdx].name=it.name;
  S.items[itemIdx].unit=it.unit;
  S.items[itemIdx].price=it.price;
  save();renderItems();renderPreview();hideSuggest();
}


const S = {
  shop:'', phone:'', no:'', date:'', cust:'', remark:'', signer:'',
  invoice:false, invoiceRate:1.01,
  items:[]
};
const LS='chuhuodan_v1';
function blankItem(){return {name:'',qty:'',unit:'张',price:''}}

function save(){try{localStorage.setItem(LS,JSON.stringify(S))}catch(e){}}
function load(){try{const d=JSON.parse(localStorage.getItem(LS)||'{}');Object.assign(S,d)}catch(e){}}

// ---------- 单号 & 日期 ----------
function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function genNo(){const d=new Date();return d.getFullYear().toString().slice(2)+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0')+'-'+String(Math.floor(Math.random()*900+100))}
function defaultOrderNo(){return ''}
function defaultSigner(){return '阿毅'}
function stripAutoInvoiceNote(text){return String(text||'').replace(/[；;，,\s]*已含普票[\d.]+%税费/g,'').replace(/^[；;，,\s]+/,'').trim()}

// ---------- 明细 ----------
function addItem(data){
  const it=Object.assign(blankItem(),data||{});
  S.items.push(it);
  renderItems();renderPreview();
}
const UNITS=['个','张','自定义'];
function renderItems(){
  const box=document.getElementById('items');
  box.querySelectorAll('.item').forEach(n=>n.remove());
  S.items.forEach((it,i)=>{
    const row=document.createElement('div');row.className='item';
    const inList=UNITS.includes(it.unit);
    const opts=UNITS.map(u=>`<option value="${u}" ${(!inList&&u==='自定义')||u===it.unit?'selected':''}>${u}</option>`).join('');
    row.innerHTML=`
      <input placeholder="品名 规格" value="${esc(it.name)}" oninput="upd(${i},'name',this.value);showSuggest(this,${i})" onfocus="showSuggest(this,${i},true)" onblur="setTimeout(hideSuggest,200)">
      <input type="number" inputmode="decimal" placeholder="数量" value="${it.qty}" oninput="upd(${i},'qty',this.value)">
      <select onchange="unitChg(${i},this.value)">${opts}</select>
      <input type="number" inputmode="decimal" step="0.00001" placeholder="单价" value="${it.price}" oninput="upd(${i},'price',this.value)">
      <button class="del" onclick="delItem(${i})">×</button>`;
    box.appendChild(row);
    if(!inList&&it.unit){
      const sel=row.querySelector('select');
      const custom=document.createElement('input');
      custom.value=it.unit;custom.placeholder='单位';custom.style.cssText='padding:8px 4px;font-size:13px';
      custom.oninput=e=>{S.items[i].unit=e.target.value;save();renderPreview()};
      sel.replaceWith(custom);
    }
  });
}
function unitChg(i,v){
  if(v==='自定义'){S.items[i].unit='';save();renderItems();renderPreview();return}
  S.items[i].unit=v;save();renderPreview();
}
function upd(i,k,v){S.items[i][k]=v;save();renderPreview()}
function delItem(i){S.items.splice(i,1);save();renderItems();renderPreview()}
function esc(s){return String(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;')}

// ---------- 金额大写 ----------
function rmb(n){
  n=Number(n)||0;
  if(n===0) return '零元整';
  const neg=n<0;n=Math.abs(n);
  const digits='零壹贰叁肆伍陆柒捌玖';
  const units=['','拾','佰','仟'];
  const bigs=['','万','亿','兆'];
  const intPart=Math.floor(n);
  const dec=Math.round((n-intPart)*100);
  const jiao=Math.floor(dec/10), fen=dec%10;
  let s='';
  if(intPart===0){s='零'}
  else{
    const str=String(intPart);let groups=[];
    for(let i=str.length;i>0;i-=4)groups.unshift(str.slice(Math.max(0,i-4),i));
    groups.forEach((g,gi)=>{
      let gs='';let zero=false;
      for(let i=0;i<g.length;i++){
        const d=+g[i],u=g.length-1-i;
        if(d===0){zero=true}
        else{if(zero){gs+='零';zero=false}gs+=digits[d]+units[u]}
      }
      gs=gs.replace(/零+$/,'');
      if(gs)gs+=bigs[groups.length-1-gi];
      s+=gs;
    });
  }
  s+='元';
  if(jiao===0&&fen===0)s+='整';
  else{
    if(jiao)s+=digits[jiao]+'角';else if(intPart>0&&fen)s+='零';
    if(fen)s+=digits[fen]+'分';
  }
  return (neg?'负':'')+s;
}

// ---------- 预览渲染 ----------
function collect(){
  ['shop','phone','no','date','cust','remark','signer'].forEach(k=>{
    const el=document.getElementById(k);if(el)S[k]=el.value;
  });
  S.remark=stripAutoInvoiceNote(S.remark);
  const inv=document.getElementById('invoice');
  if(inv)S.invoice=inv.checked;
  const rate=document.getElementById('invoiceRate');
  if(rate)S.invoiceRate=Number(rate.value)||1;
}
function syncFormFromState(){
  ['shop','phone','no','date','cust','remark','signer'].forEach(k=>{
    const el=document.getElementById(k);if(el)el.value=S[k]||'';
  });
  const inv=document.getElementById('invoice');
  if(inv)inv.checked=!!S.invoice;
  const rate=document.getElementById('invoiceRate');
  if(rate)rate.value=S.invoiceRate||1.01;
}
function syncInvoiceUI(){
  const inv=document.getElementById('invoice');
  const rate=document.getElementById('invoiceRate');
  const lbl=document.getElementById('invoiceLabel');
  const wrap=document.getElementById('invoiceRateWrap');
  const row=document.getElementById('invoiceRow');
  if(!inv||!rate||!lbl||!wrap||!row)return;
  row.classList.toggle('full',!inv.checked);
  wrap.style.display=inv.checked?'block':'none';
  rate.disabled=!inv.checked;
  lbl.style.color=inv.checked?'#1a1a1a':'#666';
}
function invoiceNote(){
  const rate=Number(S.invoiceRate)||1;
  const pct=+((rate-1)*100).toFixed(4);
  return '已含普票'+pct+'%税费';
}
function renderPreview(){
  collect();save();
  const factor=S.invoice?(Number(S.invoiceRate)||1):1;
  let total=0;
  const rows=S.items.map((it,i)=>{
    const q=Number(it.qty)||0,rawP=Number(it.price)||0,p=rawP*factor;
    // 每行金额先四舍五入到2位，再累加入合计，确保显示值相加等于合计
    const sub=Math.round(q*p*100)/100;total+=sub;
    return `<tr><td>${i+1}</td><td class="name">${esc(it.name)||'&nbsp;'}</td><td>${q||''}</td><td>${esc(it.unit||'')}</td><td>${p?p.toFixed(5):''}</td><td>${sub?sub.toFixed(2):''}</td></tr>`;
  }).join('');
  const empty=Math.max(0,4-S.items.length);
  const pad=Array(empty).fill('<tr><td>&nbsp;</td><td></td><td></td><td></td><td></td><td></td></tr>').join('');
  const shopName=esc(S.shop)||'店铺名称';
  const mark=(S.shop||'店').trim().charAt(0);
  const remarkText=esc(S.remark)||'&nbsp;';
  document.getElementById('preview').innerHTML=`
    <div class="brand">
      <div class="brand-mark">${esc(mark)}</div>
      <div class="brand-text">
        <div class="brand-name">${shopName}</div>
        <div class="brand-phone">TEL&nbsp;&nbsp;${esc(S.phone)||'—'}</div>
      </div>
    </div>
    <div class="title-wrap"><span class="doc-title">出&nbsp;货&nbsp;单</span></div>
    <div class="doc-sub">DELIVERY&nbsp;&nbsp;NOTE</div>
    <div class="meta">
      <div class="m-l"><div><span class="k">客户</span>${esc(S.cust)||'____________'}</div></div>
      <div class="m-r">
        <div><span class="k">单号</span>${esc(S.no)||'____________'}</div>
        <div><span class="k">日期</span>${esc(S.date)||'____________'}</div>
      </div>
    </div>
    <table>
      <thead><tr><th style="width:46px">序号</th><th>品名 / 规格</th><th style="width:50px">数量</th><th style="width:44px">单位</th><th style="width:80px">${S.invoice?'含票单价':'单价'}</th><th style="width:78px">金额</th></tr></thead>
      <tbody>${rows}${pad}</tbody>
      <tfoot><tr><td colspan="5" style="text-align:right">合计 &nbsp;¥</td><td>${total.toFixed(2)}</td></tr></tfoot>
    </table>
    <div class="total-cn"><span class="k">人民币（大写）</span><span class="v">${rmb(total)}</span></div>
    ${S.invoice?`<div class="total-cn" style="border-top:none"><span class="k">发票系数</span><span class="v">× ${Number(S.invoiceRate)||1}</span></div>`:''}
    ${S.invoice?`<div class="invoice-note">发票说明：${invoiceNote()}</div>`:''}
    <div class="remark">备注：${remarkText}</div>
    <div class="foot">
      <span class="k">经手人：</span><span class="name">${esc(S.signer)||'&nbsp;'}</span>
    </div>`;
}

function resetOrderState({preserveDate}){
  S.no=defaultOrderNo();
  if(!preserveDate)S.date=todayStr();
  S.cust='';
  S.remark='';
  S.signer=defaultSigner();
  S.invoice=false;
  S.items=[blankItem(),blankItem()];
  syncFormFromState();
  hideSuggest();
  syncInvoiceUI();
  renderItems();
  renderPreview();
  document.getElementById('cust')?.focus();
}
function newOrder(){
  if(!confirm('开始新的一单？会清空客户、明细、备注和开票状态。'))return;
  resetOrderState({preserveDate:false});
}
function clearCurrentOrder(){
  if(!confirm('清空当前单据内容？会保留店铺信息、电话和日期。'))return;
  resetOrderState({preserveDate:true});
}
function validateBeforeExport(){
  collect();
  const issues=[];
  if(!(S.cust||'').trim())issues.push('请填写客户名称');
  const completeRows=[];
  const incompleteRows=[];
  S.items.forEach((it,i)=>{
    const hasAny=String(it.name||'').trim()!==''||String(it.qty||'').trim()!==''||String(it.price||'').trim()!=='';
    const qty=Number(it.qty);
    const priceStr=String(it.price??'').trim();
    const complete=String(it.name||'').trim()!==''&&String(it.qty||'').trim()!==''&&qty>0&&priceStr!==''&&!isNaN(Number(priceStr));
    if(hasAny){
      if(complete)completeRows.push(i+1);
      else incompleteRows.push(i+1);
    }
  });
  if(!completeRows.length)issues.push('请至少填写一条完整商品明细');
  if(incompleteRows.length)issues.push('第 '+incompleteRows.join('、')+' 行信息还没填完整');
  if(issues.length){
    if(!(S.cust||'').trim())document.getElementById('cust')?.focus();
    alert(issues.join('\n'));
    return false;
  }
  return true;
}

// ---------- 导出 ----------
async function snap(){
  return await html2canvas(document.getElementById('preview'),{scale:3,backgroundColor:'#fff',useCORS:true});
}
async function exportPNG(){
  if(!validateBeforeExport())return;
  renderPreview();
  const c=await snap();
  const a=document.createElement('a');
  a.download=`出货单_${S.cust||'客户'}_${S.date||todayStr()}.png`;
  a.href=c.toDataURL('image/png');a.click();
}
async function exportPDF(){
  if(!validateBeforeExport())return;
  renderPreview();
  const c=await snap();
  const {jsPDF}=window.jspdf;
  const pdf=new jsPDF('p','mm','a4');
  const w=210,h=c.height*w/c.width;
  pdf.addImage(c.toDataURL('image/png'),'PNG',0,0,w,Math.min(h,297));
  pdf.save(`出货单_${S.cust||'客户'}_${S.date||todayStr()}.pdf`);
}
